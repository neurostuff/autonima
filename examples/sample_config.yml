# sample_config.yaml
# Example Autonima pipeline specification
# Defines a systematic review according to PRISMA steps

search:
  database: "pubmed"
  query: "schizophrenia AND working memory AND fMRI"
  max_results: 100
  # Optional date filtering - format: YYYY/MM/DD
  # date_from: "2020/01/01"
  # date_to: "2024/12/31"
  email: "your.email@example.com"  # Optional but recommended for NCBI API access

retrieval:
  sources:
    - pubget
    - ace

screening:
  abstract:
    model: "gpt-5-mini-2025-08-07"   # LLM for abstract screening
    objective: "Identify fMRI studies of working memory in schizophrenia"
    inclusion_criteria:
      - Human participants
      - fMRI neuroimaging
      - Case-control or experimental design
      - Task-based working memory paradigm
    exclusion_criteria:
      - Animal studies
      - Review articles, meta-analyses, or theoretical papers
      - Non-fMRI imaging modalities (e.g., PET, EEG, MEG)
      - Studies without a control or comparison group
    # confidence_reporting: false  # Optional: enable confidence reporting (default: false)
    # threshold: 0.9  # Optional: probability cutoff for inclusion (default: none)
    # additional_instructions: "Pay special attention to sample sizes and effect sizes reported."
  fulltext:
    model: "gpt-5-mini-2025-08-07"
    # objective: "Identify fMRI studies of working memory in schizophrenia"  # Optional: override abstract objective
    # inclusion_criteria:  # Optional: override abstract inclusion criteria
    #   - Human participants
    #   - fMRI neuroimaging
    #   - Case-control or experimental design
    #   - Task-based working memory paradigm
    # exclusion_criteria:  # Optional: override abstract exclusion criteria
    #   - Animal studies
    #   - Review articles, meta-analyses, or theoretical papers
    #   - Non-fMRI imaging modalities (e.g., PET, EEG, MEG)
    #   - Studies without a control or comparison group
    # confidence_reporting: false  # Optional: enable confidence reporting (default: false)
    # threshold: 0.95  # Optional: probability cutoff for inclusion (default: none)
    # additional_instructions: "Focus on methodological rigor and statistical significance."

output:
  formats:
    - json
    - nimads
    - csv
  prisma_diagram: true  # Generate a PRISMA flow diagram