# Example Autonima pipeline specification
# Defines a systematic review according to PRISMA steps.
#
# This file is the canonical sample config used by:
# - `autonima create-sample-config`
# - the repository example config
# - the user documentation

search:
  database: "pubmed"
  # Option 1: Specify a search query.
  query: "schizophrenia AND working memory AND fMRI"
  # Option 2: Provide a list of PMIDs directly.
  # pmids_list:
  #   - "12345678"
  #   - "23456789"
  #   - "34567890"
  # Option 3: Provide a file with one PMID per line.
  # pmids_file: "path/to/pmids.txt"
  max_results: 100
  # Optional date filtering, formatted as YYYY/MM/DD.
  # date_from: "2020/01/01"
  # date_to: "2024/12/31"
  email: "your.email@example.com"  # Recommended for NCBI API access.

retrieval:
  load_excluded: false  # Load full texts for abstract-excluded studies too.
  sources:
    - pubget
  # full_text_sources:
  #   # Example: HTML files where the filename is the PMID.
  #   - root_path: "/path/to/your/html/files"
  #     pmid_source: "file_name"
  #     allowed_extensions: [".html"]
  #     # Table source for this specific source (pubget-like format).
  #     processed_data_path: "/path/to/processed/pubget_like_data"
  #
  #   # Example: folder-based structure with plain-text files.
  #   - root_path: "/path/to/your/first/full/texts"
  #     pmid_source: "folder_name"  # or "json" or "file_name"
  #     text_path_templates:
  #       - "fulltext.txt"
  #       - "text.txt"
  #     processed_data_path: "/path/to/processed/pubget_like_data"
  #
  #   # Example: folder-based structure with JSON metadata.
  #   - root_path: "/path/to/your/second/full/texts"
  #     pmid_source: "json"
  #     text_path_templates:
  #       - "processed/pubget/text.txt"
  #       - "text.txt"
  #     json_filename: "identifiers.json"
  #     json_pmid_key: "pmid"
  #     # Use coordinates_path_templates instead of processed_data_path when
  #     # coordinates live alongside each document source.
  #     # coordinates_path_templates:
  #     #   - "coordinates.json"
  #     processed_data_path: "/path/to/processed/pubget_like_data"

screening:
  abstract:
    model: "gpt-5-mini-2025-08-07"
    objective: "Identify fMRI studies of working memory in schizophrenia"
    inclusion_criteria:
      - Human participants
      - fMRI neuroimaging
      - Case-control or experimental design
      - Task-based working memory paradigm
    exclusion_criteria:
      - Animal studies
      - Review articles, meta-analyses, or theoretical papers
      - Non-fMRI imaging modalities (e.g., PET, EEG, MEG)
      - Studies without a control or comparison group
    # confidence_reporting: false  # Optional, default false.
    # threshold: 0.9  # Optional probability cutoff.
    # additional_instructions: "Pay special attention to sample sizes."

  fulltext:
    model: "gpt-5-mini-2025-08-07"
    # Full-text screening must currently define its own objective and
    # inclusion criteria (or set skip_stage: true).
    objective: "Identify fMRI studies of working memory in schizophrenia"
    inclusion_criteria:
      - Human participants
      - fMRI neuroimaging
      - Case-control or experimental design
      - Task-based working memory paradigm
    exclusion_criteria:
      - Animal studies
      - Review articles, meta-analyses, or theoretical papers
      - Non-fMRI imaging modalities (e.g., PET, EEG, MEG)
      - Studies without a control or comparison group
    # confidence_reporting: false
    # threshold: 0.95
    # additional_instructions: "Focus on methodological rigor."

parsing:
  parse_coordinates: true
  coordinate_model: "gpt-4o-mini"

output:
  # Keep this non-empty. The CLI can override it with an explicit output folder
  # or default to a folder derived from the config filename.
  directory: "results"
  formats: ["csv", "json"]
  nimads: false
  export_excluded_studies: false

annotation:
  enabled: true
  model: "gpt-4o-mini"
  # Options: "single_analysis" or "multi_analysis".
  prompt_type: "multi_analysis"
  create_all_included_annotations: true
  # metadata_fields:
  #   - "analysis_name"
  #   - "analysis_description"
  #   - "table_caption"
  #   - "study_title"
  #   - "study_abstract"
  #   - "study_fulltext"
